# ============================================================
# Flash Sale - Nginx 虚拟主机配置
# 功能：负载均衡（三种算法可切换）+ 动静分离
# ============================================================

# ============================================================
# 上游后端集群（默认算法：轮询 Round Robin）
# 切换算法：注释/取消注释对应 upstream 块并修改 proxy_pass
# ============================================================

# ① 轮询 Round Robin（默认，不需要额外指令）
upstream backend_roundrobin {
    server app1:8080;
    server app2:8080;

    # 健康检查（商业版支持，开源版靠 max_fails/fail_timeout 被动检测）
    keepalive 32;
}

# ② 加权轮询 Weighted Round Robin
upstream backend_weighted {
    server app1:8080 weight=3;
    server app2:8080 weight=1;
    keepalive 32;
}

# ③ IP Hash（同一客户端 IP 固定路由到同一后端）
upstream backend_iphash {
    ip_hash;
    server app1:8080;
    server app2:8080;
    keepalive 32;
}

# ④ 最少连接 Least Connections
upstream backend_leastconn {
    least_conn;
    server app1:8080;
    server app2:8080;
    keepalive 32;
}

# ============================================================
# 当前生效的上游（修改此变量即可切换算法）
# ============================================================
# 如需切换，将下方 proxy_pass 中的 backend_roundrobin 改为对应名称

server {
    listen 80;
    server_name localhost;

    # ============================================================
    # 动静分离
    # 静态资源：直接由 Nginx 提供，不走后端
    # 动态请求：转发至后端 Spring Boot 集群
    # ============================================================

    # --- 静态资源 ---
    # 匹配 /static/ 路径或常见静态文件后缀
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Served-By "nginx-static";
    }

    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Served-By "nginx-static";
        try_files $uri $uri/ =404;
    }

    # --- 根路径：返回首页静态 HTML ---
    location = / {
        root /usr/share/nginx/html;
        index index.html;
        add_header X-Served-By "nginx-static";
    }

    # --- 动态请求：转发到后端集群 ---
    # /api/* 全部代理到 Spring Boot（context-path=/api）
    location /api/ {
        proxy_pass http://backend_roundrobin;   # ← 切换负载均衡算法改这里
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # 支持 keepalive

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # 后端故障时的被动健康检查
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;

        add_header X-Upstream-Addr $upstream_addr always;   # 显示实际后端节点（方便 JMeter 验证）
    }

    # --- 健康检查端点（不走后端，nginx 自答）---
    location /nginx-health {
        return 200 '{"status":"ok","server":"nginx"}';
        add_header Content-Type application/json;
    }

    # 404 fallback
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
