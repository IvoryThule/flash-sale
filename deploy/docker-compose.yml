# ============================================================
# Flash Sale System - Docker Compose (开发环境)
# 启动: docker compose -f deploy/docker-compose.yml up -d
# 停止: docker compose -f deploy/docker-compose.yml down
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: flash-sale-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flash_sale
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - flash-sale-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - flash-sale-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flash-sale-mysql-data:
  flash-sale-redis-data:
