# ============================================================
# Flash Sale System - Docker Compose (完整生产环境)
# 包含：MySQL + Redis + 后端双实例 + Nginx 负载均衡 + 动静分离
#
# 启动全部服务:
#   docker compose -f deploy/docker-compose.yml up -d
#
# 仅启动基础设施（本地开发调试）:
#   docker compose -f deploy/docker-compose.yml up -d mysql redis
#
# 查看 Nginx 负载均衡日志（验证请求分布）:
#   docker compose -f deploy/docker-compose.yml logs -f nginx
#
# 停止并清理 volume:
#   docker compose -f deploy/docker-compose.yml down -v
# ============================================================

services:

  # ==================== 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: flash-sale-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flash_sale
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - flash-sale-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      # 读写分离：开启 binlog（master 角色）
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL 从库（模拟读写分离，同一镜像，读操作路由到此节点）
  mysql-replica:
    image: mysql:8.0
    container_name: flash-sale-mysql-replica
    restart: unless-stopped
    ports:
      - "${MYSQL_REPLICA_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flash_sale
      TZ: Asia/Shanghai
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - flash-sale-mysql-replica-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --server-id=2
      - --relay-log=relay-bin
      - --read-only=ON   # 从库只读
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - flash-sale-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 后端实例 1（端口 8081）====================
  app1:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: flash-sale-api:latest
    container_name: flash-sale-app1
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: flash_sale
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_REPLICA_HOST: mysql-replica
      DB_REPLICA_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Shanghai
      INSTANCE_ID: app1   # 日志中标识节点，方便验证负载分布
    depends_on:
      mysql:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== 后端实例 2（端口 8082）====================
  app2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: flash-sale-api:latest
    container_name: flash-sale-app2
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: flash_sale
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_REPLICA_HOST: mysql-replica
      DB_REPLICA_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Shanghai
      INSTANCE_ID: app2
    depends_on:
      mysql:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Nginx（端口 80）====================
  nginx:
    image: nginx:1.25-alpine
    container_name: flash-sale-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 动静分离：挂载前端静态文件目录
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - app1
      - app2

volumes:
  flash-sale-mysql-data:
  flash-sale-mysql-replica-data:
  flash-sale-redis-data:
