# ============================================================
# Flash Sale System - Application Configuration
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /api

# ==================== Spring Configuration ====================
spring:
  application:
    name: flash-sale-api

  # -------------------- 读写分离双数据源 --------------------
  # 主库（写）：DB_HOST / DB_PORT
  # 从库（读）：DB_REPLICA_HOST / DB_REPLICA_PORT（默认与主库同 Host 但用 3308）
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure

  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:flash_sale}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:root}
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${DB_REPLICA_HOST:localhost}:${DB_REPLICA_PORT:3308}/${DB_NAME:flash_sale}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:root}
      initial-size: 3
      min-idle: 3
      max-active: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # -------------------- Redis --------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  # -------------------- Jackson --------------------
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # -------------------- Kafka --------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ${KAFKA_GROUP_ID:flash-sale-seckill-group}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# ==================== MyBatis Configuration ====================
# 注意：SqlSessionFactory 由 DataSourceConfig 手动创建（读写分离需要），
# 以下配置作为文档保留，实际生效的配置在 DataSourceConfig.sqlSessionFactory()
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.flashsale.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Logging ====================
logging:
  level:
    com.flashsale: debug
    com.flashsale.mapper: debug
    com.flashsale.config.datasource: debug   # 打印数据源路由日志（方便验证读写分离）

# ==================== Custom Configuration ====================
flash-sale:
  jwt:
    secret: FlashSaleSystemSecretKey2026ForJWTTokenGeneration
    expiration: 86400000  # 24 hours in milliseconds
  seckill:
    order-expire-minutes: 15  # 订单支付超时时间（分钟）
    async-enabled: ${FLASH_SALE_ASYNC_ENABLED:false}
  kafka:
    enabled: ${FLASH_SALE_KAFKA_ENABLED:false}
    seckill-topic: ${FLASH_SALE_KAFKA_TOPIC:flash-sale-seckill-order}
  id:
    worker-id: ${FLASH_SALE_WORKER_ID:1}
    datacenter-id: ${FLASH_SALE_DATACENTER_ID:1}
