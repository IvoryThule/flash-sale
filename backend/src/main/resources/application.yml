# ============================================================
# Flash Sale System - Application Configuration
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /api

# ==================== Spring Configuration ====================
spring:
  application:
    name: flash-sale-api

  # -------------------- DataSource (Druid) --------------------
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:flash_sale}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # -------------------- Redis --------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  # -------------------- Jackson --------------------
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ==================== MyBatis Configuration ====================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.flashsale.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Logging ====================
logging:
  level:
    com.flashsale: debug
    com.flashsale.mapper: debug

# ==================== Custom Configuration ====================
flash-sale:
  jwt:
    secret: FlashSaleSystemSecretKey2026ForJWTTokenGeneration
    expiration: 86400000  # 24 hours in milliseconds
  seckill:
    order-expire-minutes: 15  # 订单支付超时时间（分钟）
